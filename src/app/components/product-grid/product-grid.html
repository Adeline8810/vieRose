<section class="product-grid-section">
  <h2>Notre Sélection</h2>
  <div class="grid">
    <div class="product-card" *ngFor="let item of productos">
      <img [src]="item.imagen" [alt]="item.nombre" class="product-img">
      <h3>{{ item.nombre }}</h3>
      <p>{{ item.precio }}</p>

      <a [href]="generarLinkWhatsApp(item.nombre)" target="_blank" class="btn-comprar">
        Commander via WhatsApp
      </a>
    </div>
  </div>
</section>
