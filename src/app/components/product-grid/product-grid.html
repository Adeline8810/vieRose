<section class="product-grid-section">
  <h2>Nuestros Productos</h2>
  <div class="grid">
    <div class="product-card" *ngFor="let item of [1,2,3,4,5,6]">
      <div class="image-placeholder"></div>
      <h3>Nombre del Producto</h3>
      <p>$99.99</p>
      <button>Ver Detalles</button>
    </div>
  </div>
</section>
